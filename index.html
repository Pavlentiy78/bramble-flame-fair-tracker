// ---- localStorage-backed shim matching the Claude artifact window.storage API ----
// Mirrors the shape used by the original artifact: get/set/delete/list, each
// returning {key, value, shared} | null (or throwing), so the component code
// below is unchanged from the Claude-artifact version.
window.storage = {
  async get(key, shared) {
    const raw = localStorage.getItem("bf_" + key);
    if (raw === null) throw new Error("not found");
    return { key, value: raw, shared: !!shared };
  },
  async set(key, value, shared) {
    localStorage.setItem("bf_" + key, value);
    return { key, value, shared: !!shared };
  },
  async delete(key, shared) {
    localStorage.removeItem("bf_" + key);
    return { key, deleted: true, shared: !!shared };
  },
  async list(prefix, shared) {
    const keys = Object.keys(localStorage)
      .filter((k) => k.startsWith("bf_" + (prefix || "")))
      .map((k) => k.slice(3));
    return { keys, prefix, shared: !!shared };
  },
};

function uid() {
  return Math.random().toString(36).slice(2, 10);
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const target = new Date(dateStr + "T00:00:00");
  const now = new Date();
  now.setHours(0, 0, 0, 0);
  return Math.round((target - now) / 86400000);
}

function fmtDate(dateStr) {
  if (!dateStr) return "No date set";
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
}

// Bramble & Flame fair monitor — public repo, seen.json on the default branch.
const MONITOR_RAW_URL =
  "https://raw.githubusercontent.com/Pavlentiy78/bramble-flame-fair-monitor/claude/fair-monitor-scraper-lhs0a3/seen.json";

// The monitor stores dates as "DD-MM-YYYY", "DD/MM/YYYY", or a range like
// "DD-MM-YYYY to DD-MM-YYYY" — take the first date and convert to YYYY-MM-DD
// for the <input type="date"> fields here.
function parseMonitorDate(raw) {
  if (!raw) return "";
  const first = raw.split(/\s+to\s+/i)[0].trim();
  const m = first.match(/^(\d{2})[-\/](\d{2})[-\/](\d{4})$/);
  if (!m) return "";
  const [, dd, mm, yyyy] = m;
  return `${yyyy}-${mm}-${dd}`;
}

function FairTracker() {
  const [fairs, setFairs] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [filter, setFilter] = useState("All");
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const [error, setError] = useState("");
  const [importStatus, setImportStatus] = useState(null); // { loading, message, showPaste? } | null
  const [showPasteModal, setShowPasteModal] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        const result = await window.storage.get("fairs", false);
        if (result && result.value) {
          setFairs(JSON.parse(result.value));
        } else {
          setFairs(SEED_FAIRS);
          await window.storage.set("fairs", JSON.stringify(SEED_FAIRS), false);
        }
      } catch (e) {
        setFairs(SEED_FAIRS);
      } finally {
        setLoaded(true);
      }
    })();
  }, []);

  async function persist(next) {
    setFairs(next);
    const payload = JSON.stringify(next);
    let lastErr = "";
    for (let attempt = 1; attempt <= 3; attempt++) {
      try {
        const res = await window.storage.set("fairs", payload, false);
        if (res) {
          setError("");
          return;
        }
        lastErr = "storage.set returned no result";
      } catch (e) {
        lastErr = e && e.message ? e.message : String(e);
      }
      if (attempt < 3) await new Promise((r) => setTimeout(r, 500 * attempt));
    }
    setError(`Could not save (${lastErr}) — changes are visible now but may not persist after reload.`);
  }

  function mergeMonitorEntries(seen) {
    const entries = Object.values(seen || {});
    const existingKeys = new Set(
      fairs.map((f) => `${(f.name || "").trim().toLowerCase()}|${f.date || ""}`)
    );
    const additions = [];
    for (const entry of entries) {
      const date = parseMonitorDate(entry.date);
      const key = `${(entry.name || "").trim().toLowerCase()}|${date}`;
      if (existingKeys.has(key)) continue;
      existingKeys.add(key);
      additions.push({
        id: uid(),
        name: entry.name || "Untitled fair",
        venue: entry.venue || "",
        location: entry.county || "",
        date,
        deadline: "",
        fee: "",
        setting: "Indoor",
        suitability: "",
        status: "To research",
        link: entry.url || "",
        notes: entry.source ? `Imported from monitor (${entry.source}).` : "Imported from monitor.",
      });
    }
    return additions;
  }

  async function importFromMonitor() {
    setImportStatus({ loading: true, message: "Checking the fair monitor…" });
    try {
      const res = await fetch(`${MONITOR_RAW_URL}?t=${Date.now()}`, { cache: "no-store" });
      if (!res.ok) throw new Error(`monitor returned ${res.status}`);
      const seen = await res.json();
      const additions = mergeMonitorEntries(seen);

      if (additions.length === 0) {
        setImportStatus({ loading: false, message: "No new fairs — you're up to date." });
      } else {
        await persist([...fairs, ...additions]);
        setImportStatus({ loading: false, message: `Added ${additions.length} new fair${additions.length === 1 ? "" : "s"}.` });
      }
    } catch (e) {
      setImportStatus({
        loading: false,
        message: "Couldn't reach the monitor automatically — use \"Paste from monitor\" instead.",
        showPaste: true,
      });
    }
  }

  async function importFromPaste(rawText) {
    try {
      const seen = JSON.parse(rawText);
      const additions = mergeMonitorEntries(seen);
      if (additions.length === 0) {
        setImportStatus({ loading: false, message: "No new fairs found in that data." });
      } else {
        await persist([...fairs, ...additions]);
        setImportStatus({ loading: false, message: `Added ${additions.length} new fair${additions.length === 1 ? "" : "s"}.` });
      }
      setShowPasteModal(false);
    } catch (e) {
      setImportStatus({ loading: false, message: "That didn't look like valid monitor data — check it's the full seen.json content." });
    }
  }

  function openNew() {
    setEditing({
      id: uid(),
      name: "",
      venue: "",
      location: "",
      date: "",
      deadline: "",
      fee: "",
      setting: "Indoor",
      suitability: "",
      status: "To research",
      link: "",
      notes: "",
    });
    setShowForm(true);
  }

  function openEdit(fair) {
    setEditing({ ...fair });
    setShowForm(true);
  }

  function saveFair(fair) {
    const exists = fairs.some((f) => f.id === fair.id);
    const next = exists ? fairs.map((f) => (f.id === fair.id ? fair : f)) : [...fairs, fair];
    persist(next);
    setShowForm(false);
    setEditing(null);
  }

  function removeFair(id) {
    persist(fairs.filter((f) => f.id !== id));
  }

  const filtered = useMemo(() => {
    let list = [...fairs];
    if (filter !== "All") list = list.filter((f) => f.status === filter);
    list.sort((a, b) => {
      if (!a.date) return 1;
      if (!b.date) return -1;
      return a.date.localeCompare(b.date);
    });
    return list;
  }, [fairs, filter]);

  const upcomingDeadlines = useMemo(() => {
    return fairs
      .filter((f) => f.deadline && daysUntil(f.deadline) >= 0 && daysUntil(f.deadline) <= 21)
      .sort((a, b) => a.deadline.localeCompare(b.deadline));
  }, [fairs]);

  if (!loaded) {
    return (
      <div style={{ background: PARCHMENT, minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 14 }}>
        <img src={FLAME_ICON} alt="" width={40} height={40} style={{ borderRadius: 8, opacity: 0.85 }} />
        <div style={{ color: INK_SOFT, fontFamily: "Georgia, serif" }}>Lighting the tracker…</div>
      </div>
    );
  }

  return (
    <div style={{ background: PARCHMENT, minHeight: "100vh", color: INK, fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&display=swap');
        .brand-font { font-family: 'Fraunces', Georgia, serif; }
        input, select, textarea { font-family: inherit; }
        input::placeholder, textarea::placeholder { color: rgba(42,30,23,0.35); }
        .fair-card { transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease; }
        .fair-card:hover { border-color: rgba(201,129,46,0.55); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(42,30,23,0.08); }
        button { font-family: inherit; cursor: pointer; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: rgba(42,30,23,0.18); border-radius: 4px; }
      `}</style>

      {/* Header */}
      <header
        style={{
          padding: "26px 24px 24px",
          background: `linear-gradient(150deg, ${PLUM} 0%, ${PLUM_DEEP} 100%)`,
          borderBottom: `3px solid ${AMBER}`,
        }}
      >
        <div style={{ maxWidth: 880, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 16 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
            <img
              src={EMBLEM_LOGO}
              alt="Bramble & Flame"
              style={{ height: 76, width: "auto", borderRadius: 6, boxShadow: "0 2px 10px rgba(0,0,0,0.35)" }}
            />
            <div>
              <h1 className="brand-font" style={{ fontSize: 26, fontWeight: 600, margin: 0, lineHeight: 1.15, color: "#F6EAD3" }}>
                Fair &amp; Market Tracker
              </h1>
              <div style={{ fontSize: 13, color: "rgba(246,234,211,0.65)", marginTop: 4 }}>
                Derbyshire &amp; East Midlands · handmade candle stalls
              </div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
            <button
              onClick={importFromMonitor}
              disabled={importStatus?.loading}
              style={{
                background: "transparent",
                color: AMBER_SOFT,
                border: `1px solid ${AMBER}`,
                borderRadius: 8,
                padding: "10px 16px",
                fontSize: 14,
                fontWeight: 600,
                whiteSpace: "nowrap",
                opacity: importStatus?.loading ? 0.6 : 1,
              }}
            >
              {importStatus?.loading ? "Checking…" : "↻ Import from monitor"}
            </button>
            <button
              onClick={openNew}
              style={{
                background: AMBER,
                color: "#2A1608",
                border: "none",
                borderRadius: 8,
                padding: "11px 18px",
                fontSize: 14,
                fontWeight: 600,
                whiteSpace: "nowrap",
              }}
            >
              + Add a fair
            </button>
          </div>
        </div>
        {importStatus && !importStatus.loading && (
          <div style={{ maxWidth: 880, margin: "10px auto 0", fontSize: 13, color: "rgba(246,234,211,0.65)" }}>
            {importStatus.message}
            {importStatus.showPaste && (
              <button
                onClick={() => setShowPasteModal(true)}
                style={{ background: "none", border: "none", color: AMBER_SOFT, textDecoration: "underline", fontSize: 13, marginLeft: 8, padding: 0 }}
              >
                Paste from monitor
              </button>
            )}
          </div>
        )}
      </header>

      <main style={{ maxWidth: 880, margin: "0 auto", padding: "24px 24px 64px" }}>
        {/* Deadlines strip */}
        {upcomingDeadlines.length > 0 && (
          <div style={{ background: PARCHMENT_CARD, border: `1px solid ${LINE}`, borderLeft: `4px solid ${AMBER}`, borderRadius: 10, padding: "14px 18px", marginBottom: 22 }}>
            <div style={{ fontSize: 12, letterSpacing: "0.1em", textTransform: "uppercase", color: "#9C5F1E", marginBottom: 8, fontWeight: 600 }}>
              Application deadlines within 3 weeks
            </div>
            {upcomingDeadlines.map((f) => {
              const d = daysUntil(f.deadline);
              return (
                <div key={f.id} style={{ fontSize: 14, padding: "4px 0", display: "flex", justifyContent: "space-between" }}>
                  <span>{f.name}</span>
                  <span style={{ color: d <= 5 ? BERRY : INK_SOFT }}>
                    {d === 0 ? "today" : d === 1 ? "tomorrow" : `in ${d} days`} · {fmtDate(f.deadline)}
                  </span>
                </div>
              );
            })}
          </div>
        )}

        {/* Filters */}
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 20 }}>
          {["All", ...STATUSES].map((s) => (
            <button
              key={s}
              onClick={() => setFilter(s)}
              style={{
                background: filter === s ? AMBER : "transparent",
                color: filter === s ? "#2A1608" : INK_SOFT,
                border: `1px solid ${filter === s ? AMBER : LINE}`,
                borderRadius: 999,
                padding: "6px 14px",
                fontSize: 13,
                fontWeight: filter === s ? 600 : 400,
              }}
            >
              {s}
              {s !== "All" && ` (${fairs.filter((f) => f.status === s).length})`}
            </button>
          ))}
        </div>

        {/* List */}
        {filtered.length === 0 ? (
          <div style={{ textAlign: "center", padding: "60px 20px", color: INK_FAINT }}>
            <div className="brand-font" style={{ fontSize: 20, marginBottom: 6, color: PLUM }}>Nothing here yet</div>
            <div style={{ fontSize: 14 }}>Add a fair, or choose a different filter.</div>
          </div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {filtered.map((f) => {
              const dLeft = daysUntil(f.date);
              const stStyle = STATUS_STYLE[f.status] || STATUS_STYLE["To research"];
              return (
                <div
                  key={f.id}
                  className="fair-card"
                  style={{ background: PARCHMENT_CARD, border: `1px solid ${LINE}`, borderRadius: 12, padding: 18, cursor: "pointer" }}
                  onClick={() => openEdit(f)}
                >
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12, flexWrap: "wrap" }}>
                    <div style={{ flex: 1, minWidth: 200 }}>
                      <div className="brand-font" style={{ fontSize: 18, fontWeight: 600, color: PLUM }}>{f.name || "Untitled fair"}</div>
                      <div style={{ fontSize: 13.5, color: INK_SOFT, marginTop: 2 }}>
                        {[f.venue, f.location].filter(Boolean).join(" · ") || "No venue set"}
                      </div>
                    </div>
                    <span style={{ background: stStyle.bg, color: stStyle.fg, borderRadius: 999, padding: "4px 12px", fontSize: 12.5, fontWeight: 600, whiteSpace: "nowrap" }}>
                      {f.status}
                    </span>
                  </div>

                  <div style={{ display: "flex", gap: 18, flexWrap: "wrap", marginTop: 12, fontSize: 13.5 }}>
                    <div>
                      <span style={{ color: INK_FAINT }}>Date </span>
                      <span style={{ fontFamily: "ui-monospace, monospace" }}>{fmtDate(f.date)}</span>
                      {dLeft !== null && dLeft >= 0 && (
                        <span style={{ color: SAGE }}> · {dLeft === 0 ? "today" : `${dLeft}d away`}</span>
                      )}
                    </div>
                    {f.fee && (
                      <div>
                        <span style={{ color: INK_FAINT }}>Stall fee </span>
                        <span style={{ fontFamily: "ui-monospace, monospace" }}>{f.fee}</span>
                      </div>
                    )}
                    {f.setting && (
                      <div>
                        <span style={{ color: INK_FAINT }}>Setting </span>
                        {f.setting}
                      </div>
                    )}
                  </div>

                  {f.suitability && (
                    <div style={{ fontSize: 13.5, color: INK_SOFT, marginTop: 10, lineHeight: 1.5 }}>
                      {f.suitability}
                    </div>
                  )}

                  <div style={{ display: "flex", justifyContent: "flex-end", gap: 14, marginTop: 10 }}>
                    {f.link && (
                      <a
                        href={f.link}
                        target="_blank"
                        rel="noreferrer"
                        onClick={(e) => e.stopPropagation()}
                        style={{ color: "#9C5F1E", fontSize: 13 }}
                      >
                        Visit page ↗
                      </a>
                    )}
                    <button
                      onClick={(e) => {
                        e.stopPropagation();
                        if (window.confirm(`Remove "${f.name}" from the tracker?`)) removeFair(f.id);
                      }}
                      style={{ background: "none", border: "none", color: INK_FAINT, fontSize: 13 }}
                    >
                      Remove
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </main>

      {showForm && editing && (
        <FairForm
          fair={editing}
          onCancel={() => {
            setShowForm(false);
            setEditing(null);
          }}
          onSave={saveFair}
        />
      )}

      {showPasteModal && (
        <PasteModal onCancel={() => setShowPasteModal(false)} onImport={importFromPaste} />
      )}
    </div>
  );
}

function PasteModal({ onCancel, onImport }) {
  const [text, setText] = useState("");
  return (
    <div
      style={{
        position: "fixed",
        inset: 0,
        background: "rgba(30,20,14,0.55)",
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        padding: 16,
        zIndex: 50,
      }}
      onClick={onCancel}
    >
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          background: PARCHMENT_CARD,
          border: `1px solid ${LINE}`,
          borderTop: `4px solid ${AMBER}`,
          borderRadius: 14,
          padding: 24,
          width: "100%",
          maxWidth: 480,
          maxHeight: "88vh",
          overflowY: "auto",
          color: INK,
        }}
      >
        <div className="brand-font" style={{ fontSize: 18, fontWeight: 600, color: PLUM, marginBottom: 6 }}>
          Paste from monitor
        </div>
        <div style={{ fontSize: 13, color: INK_SOFT, marginBottom: 10, lineHeight: 1.5 }}>
          Open <span style={{ fontFamily: "ui-monospace, monospace" }}>seen.json</span> in the
          fair-monitor-scraper repo on GitHub, copy its full contents, and paste them below.
        </div>
        <textarea
          value={text}
          onChange={(e) => setText(e.target.value)}
          placeholder='{"0a95c71ac0...": {"name": "...", "date": "...", ...}, ...}'
          style={{
            width: "100%",
            minHeight: 160,
            background: PARCHMENT,
            border: `1px solid ${LINE}`,
            borderRadius: 8,
            padding: 10,
            fontSize: 12.5,
            fontFamily: "ui-monospace, monospace",
            color: INK,
            boxSizing: "border-box",
            resize: "vertical",
          }}
        />
        <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 16 }}>
          <button type="button" onClick={onCancel} style={{ background: "none", border: `1px solid ${LINE}`, color: INK, borderRadius: 8, padding: "9px 16px", fontSize: 14 }}>
            Cancel
          </button>
          <button
            type="button"
            onClick={() => onImport(text)}
            disabled={!text.trim()}
            style={{ background: AMBER, border: "none", color: "#2A1608", borderRadius: 8, padding: "9px 18px", fontSize: 14, fontWeight: 600, opacity: text.trim() ? 1 : 0.5 }}
          >
            Import
          </button>
        </div>
      </div>
    </div>
  );
}

function FairForm({ fair, onCancel, onSave }) {
  const [f, setF] = useState(fair);
  const [nameError, setNameError] = useState(false);
  const [saving, setSaving] = useState(false);
  const [submitError, setSubmitError] = useState("");

  function set(key, value) {
    setF((prev) => ({ ...prev, [key]: value }));
  }

  function handleSubmit() {
    setSubmitError("");
    if (!f.name.trim()) {
      setNameError(true);
      return;
    }
    setNameError(false);
    setSaving(true);
    try {
      onSave(f);
    } catch (err) {
      setSaving(false);
      setSubmitError(`Save failed: ${err && err.message ? err.message : String(err)}`);
    }
  }

  const fieldStyle = {
    width: "100%",
    background: PARCHMENT,
    border: `1px solid ${LINE}`,
    borderRadius: 8,
    padding: "9px 12px",
    color: INK,
    fontSize: 14,
    marginTop: 4,
    boxSizing: "border-box",
  };
  const labelStyle = { fontSize: 12.5, color: INK_SOFT, display: "block", marginTop: 14 };

  return (
    <div
      style={{
        position: "fixed",
        inset: 0,
        background: "rgba(30,20,14,0.55)",
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        padding: 16,
        zIndex: 50,
      }}
      onClick={onCancel}
    >
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          background: PARCHMENT_CARD,
          border: `1px solid ${LINE}`,
          borderTop: `4px solid ${AMBER}`,
          borderRadius: 14,
          padding: 24,
          width: "100%",
          maxWidth: 480,
          maxHeight: "88vh",
          overflowY: "auto",
          color: INK,
        }}
      >
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
          <img src={FLAME_ICON} alt="" width={22} height={22} style={{ borderRadius: 4 }} />
          <div className="brand-font" style={{ fontSize: 20, fontWeight: 600, color: PLUM }}>
            {fair.name ? "Edit fair" : "Add a fair"}
          </div>
        </div>

        <label style={labelStyle}>Fair name *</label>
        <input style={fieldStyle} value={f.name} onChange={(e) => { set("name", e.target.value); setNameError(false); }} placeholder="e.g. Bakewell Craft & Gift Fair" />
        {nameError && (
          <div style={{ color: BERRY, fontSize: 12.5, marginTop: 4 }}>Enter a fair name before saving.</div>
        )}

        <label style={labelStyle}>Venue</label>
        <input style={fieldStyle} value={f.venue} onChange={(e) => set("venue", e.target.value)} placeholder="e.g. Brigade Hall" />

        <label style={labelStyle}>Location / county</label>
        <input style={fieldStyle} value={f.location} onChange={(e) => set("location", e.target.value)} placeholder="e.g. Derbyshire" />

        <div style={{ display: "flex", gap: 12 }}>
          <div style={{ flex: 1 }}>
            <label style={labelStyle}>Fair date</label>
            <input type="date" style={fieldStyle} value={f.date} onChange={(e) => set("date", e.target.value)} />
          </div>
          <div style={{ flex: 1 }}>
            <label style={labelStyle}>Application deadline</label>
            <input type="date" style={fieldStyle} value={f.deadline} onChange={(e) => set("deadline", e.target.value)} />
          </div>
        </div>

        <div style={{ display: "flex", gap: 12 }}>
          <div style={{ flex: 1 }}>
            <label style={labelStyle}>Stall fee</label>
            <input style={fieldStyle} value={f.fee} onChange={(e) => set("fee", e.target.value)} placeholder="e.g. £35" />
          </div>
          <div style={{ flex: 1 }}>
            <label style={labelStyle}>Setting</label>
            <select style={fieldStyle} value={f.setting} onChange={(e) => set("setting", e.target.value)}>
              <option>Indoor</option>
              <option>Outdoor</option>
              <option>Mixed indoor/outdoor</option>
            </select>
          </div>
        </div>

        <label style={labelStyle}>Status</label>
        <select style={fieldStyle} value={f.status} onChange={(e) => set("status", e.target.value)}>
          {STATUSES.map((s) => (
            <option key={s}>{s}</option>
          ))}
        </select>

        <label style={labelStyle}>Why it suits candles / fire rules to check</label>
        <textarea style={{ ...fieldStyle, minHeight: 60, resize: "vertical" }} value={f.suitability} onChange={(e) => set("suitability", e.target.value)} placeholder="e.g. Indoor, no naked-flame restriction confirmed; good footfall from families" />

        <label style={labelStyle}>Link</label>
        <input style={fieldStyle} value={f.link} onChange={(e) => set("link", e.target.value)} placeholder="https://..." />

        <label style={labelStyle}>Notes</label>
        <textarea style={{ ...fieldStyle, minHeight: 50, resize: "vertical" }} value={f.notes} onChange={(e) => set("notes", e.target.value)} placeholder="Contact, past experience, packing list…" />

        {submitError && (
          <div style={{ color: BERRY, fontSize: 12.5, marginTop: 14, padding: "8px 10px", background: "rgba(138,46,57,0.1)", border: `1px solid ${BERRY}`, borderRadius: 6 }}>
            {submitError}
          </div>
        )}

        <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 20 }}>
          <button type="button" onClick={onCancel} style={{ background: "none", border: `1px solid ${LINE}`, color: INK, borderRadius: 8, padding: "9px 16px", fontSize: 14 }}>
            Cancel
          </button>
          <button type="button" onClick={handleSubmit} disabled={saving} style={{ background: AMBER, border: "none", color: "#2A1608", borderRadius: 8, padding: "9px 18px", fontSize: 14, fontWeight: 600, opacity: saving ? 0.6 : 1 }}>
            {saving ? "Saving…" : "Save"}
          </button>
        </div>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<FairTracker />);
</script>
</body>
</html>
